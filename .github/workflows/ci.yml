name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  critic:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run critic
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\critic.ps1
